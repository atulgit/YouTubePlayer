<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fullscreen Video</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
    }

    #player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

  <iframe
    id="player"
    src="https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1&mute=1"
    allow="autoplay; fullscreen; encrypted-media"
    allowfullscreen>
  </iframe>

</body>
</html>
